<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research — ติดตามงานวิจัย 30 วัน</title>
  <meta name="description"
    content="Kanban board สำหรับติดตามความคืบหน้างานวิจัย แบบ Trello ลากย้ายการ์ดได้ เก็บสถานะอัตโนมัติ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ============================================================
   CSS Custom Properties — Design Tokens
   ============================================================ */
    :root {
      --bg: #0f1117;
      --bg-secondary: #161822;
      --surface: #1e2030;
      --surface-hover: #252840;
      --surface-active: #2c3050;
      --glass: rgba(30, 32, 48, 0.72);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.03);

      --ink: #e8eaf0;
      --ink-secondary: #a0a6b8;
      --ink-muted: #6b7185;
      --ink-faint: #4a4f64;

      --brand: #6c5ce7;
      --brand-glow: rgba(108, 92, 231, 0.25);
      --brand-soft: rgba(108, 92, 231, 0.12);

      --accent-red: #ff6b6b;
      --accent-amber: #fbbf24;
      --accent-green: #34d399;
      --accent-blue: #60a5fa;
      --accent-purple: #a78bfa;
      --accent-pink: #f472b6;

      --label-urgent: #ef4444;
      --label-review: #f59e0b;
      --label-milestone: #10b981;
      --label-research: #3b82f6;
      --label-writing: #8b5cf6;

      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.18), 0 0 1px rgba(0, 0, 0, 0.3);
      --shadow-drag: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(108, 92, 231, 0.3);
      --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.6);

      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

      --col-width: 310px;
      --header-height: 64px;
    }

    /* ============================================================
   Reset & Base
   ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    input,
    textarea,
    select {
      font-family: inherit;
      color: inherit;
    }

    /* ============================================================
   Scrollbar
   ============================================================ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ink-faint);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink-muted);
    }

    /* ============================================================
   Header
   ============================================================ */
    .app-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      position: relative;
      z-index: 100;
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .app-logo .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--brand), var(--accent-purple));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 8px var(--brand-glow);
    }

    .app-logo h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, var(--ink), var(--ink-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .progress-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
    }

    .progress-bar-mini {
      width: 120px;
      height: 6px;
      background: var(--surface-active);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-mini .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--accent-purple));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-secondary);
      font-family: 'Inter', sans-serif;
      min-width: 32px;
    }

    .progress-count {
      font-size: 11px;
      color: var(--ink-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: var(--transition-fast);
      color: var(--ink-muted);
      font-size: 16px;
      position: relative;
    }

    .btn-icon:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    .btn-icon[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      top: 100%;
      margin-top: 6px;
      background: var(--ink);
      color: var(--bg);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      animation: fadeIn 0.15s ease;
    }

    /* ============================================================
   Board
   ============================================================ */
    .board {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      height: calc(100vh - var(--header-height));
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
    }

    /* ============================================================
   Column
   ============================================================ */
    .column {
      width: var(--col-width);
      min-width: var(--col-width);
      max-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition-fast);
    }

    .column.drag-over {
      border-color: var(--brand);
      box-shadow: 0 0 0 1px var(--brand), 0 0 20px var(--brand-glow);
    }

    .column-header {
      display: flex;
      align-items: center;
      padding: 14px 14px 10px;
      gap: 10px;
      flex-shrink: 0;
    }

    .column-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      margin: -2px -6px;
      outline: none;
      transition: var(--transition-fast);
      min-width: 0;
    }

    .column-title:hover {
      border-color: var(--glass-border);
    }

    .column-title:focus {
      border-color: var(--brand);
      background: var(--bg);
    }

    .column-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      background: var(--surface-active);
      padding: 1px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .column-menu-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      color: var(--ink-faint);
      font-size: 14px;
      opacity: 0;
      transition: var(--transition-fast);
    }

    .column-header:hover .column-menu-btn {
      opacity: 1;
    }

    .column-menu-btn:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    .column-cards {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .column-cards.drag-over-cards {
      background: var(--brand-soft);
      border-radius: var(--radius-sm);
    }

    /* ============================================================
   Card
   ============================================================ */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px;
      cursor: grab;
      transition: var(--transition-fast);
      position: relative;
      animation: cardIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      box-shadow: var(--shadow-card);
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: 0.4;
      transform: rotate(2deg) scale(0.98);
      box-shadow: var(--shadow-drag);
    }

    .card.card-removing {
      animation: cardOut 0.25s ease forwards;
    }

    .card-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .card-label {
      height: 6px;
      width: 40px;
      border-radius: 99px;
      transition: var(--transition-fast);
    }

    .card:hover .card-label {
      height: 14px;
      width: auto;
      padding: 0 8px;
      font-size: 10px;
      font-weight: 600;
      line-height: 14px;
      color: #fff;
    }

    .card-title {
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--ink);
      word-break: break-word;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .card-due {
      font-size: 11px;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      background: var(--surface);
      border-radius: var(--radius-xs);
    }

    .card-due.overdue {
      color: var(--accent-red);
      background: rgba(239, 68, 68, 0.1);
    }

    .card-desc-indicator {
      font-size: 11px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .card-actions {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: var(--transition-fast);
    }

    .card:hover .card-actions {
      opacity: 1;
    }

    .card-action-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      font-size: 12px;
      color: var(--ink-muted);
      background: var(--surface);
      transition: var(--transition-fast);
    }

    .card-action-btn:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    .card-action-btn.delete:hover {
      color: var(--accent-red);
      background: rgba(239, 68, 68, 0.1);
    }

    /* ============================================================
   Add Card Button
   ============================================================ */
    .add-card-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      color: var(--ink-muted);
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition-fast);
      flex-shrink: 0;
      margin: 4px 10px 10px;
    }

    .add-card-btn:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    /* Inline Add Form */
    .add-card-form {
      padding: 4px 10px 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .add-card-form.visible {
      display: flex;
    }

    .add-card-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: var(--transition-fast);
      resize: none;
    }

    .add-card-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px var(--brand-glow);
    }

    .add-form-actions {
      display: flex;
      gap: 6px;
    }

    .btn-primary {
      padding: 6px 14px;
      background: var(--brand);
      color: #fff;
      border-radius: var(--radius-xs);
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .btn-primary:hover {
      background: #7c6df0;
      box-shadow: 0 2px 10px var(--brand-glow);
    }

    .btn-ghost {
      padding: 6px 14px;
      color: var(--ink-muted);
      border-radius: var(--radius-xs);
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition-fast);
    }

    .btn-ghost:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    /* ============================================================
   Add Column
   ============================================================ */
    .add-column-btn {
      width: var(--col-width);
      min-width: var(--col-width);
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--glass-highlight);
      border: 1px dashed var(--ink-faint);
      border-radius: var(--radius);
      color: var(--ink-muted);
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition-fast);
      flex-shrink: 0;
    }

    .add-column-btn:hover {
      background: var(--surface);
      border-color: var(--brand);
      color: var(--ink);
    }

    /* ============================================================
   Modal Overlay
   ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition-normal);
    }

    .modal-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 520px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--shadow-modal);
      overflow-y: auto;
      transform: translateY(20px) scale(0.96);
      transition: var(--transition-spring);
    }

    .modal-overlay.visible .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--glass-border);
    }

    .modal-header h2 {
      font-size: 17px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      color: var(--ink-muted);
      font-size: 18px;
      transition: var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--surface-hover);
      color: var(--ink);
    }

    .modal-body {
      padding: 20px 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: var(--transition-fast);
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px var(--brand-glow);
    }

    textarea.form-input {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .label-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      transition: var(--transition-fast);
      border: 2px solid transparent;
      opacity: 0.5;
      color: #fff;
    }

    .label-toggle:hover {
      opacity: 0.8;
    }

    .label-toggle.active {
      opacity: 1;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--glass-border);
    }

    .btn-danger {
      padding: 6px 14px;
      color: var(--accent-red);
      border-radius: var(--radius-xs);
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition-fast);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    /* ============================================================
   Context Menu (Column)
   ============================================================ */
    .context-menu {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-modal);
      padding: 4px;
      min-width: 160px;
      z-index: 500;
      animation: fadeIn 0.12s ease;
    }

    .context-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: var(--radius-xs);
      transition: var(--transition-fast);
      text-align: left;
    }

    .context-menu button:hover {
      background: var(--surface-hover);
    }

    .context-menu button.danger {
      color: var(--accent-red);
    }

    .context-menu button.danger:hover {
      background: rgba(239, 68, 68, 0.08);
    }

    .context-menu .divider {
      height: 1px;
      background: var(--glass-border);
      margin: 4px 0;
    }

    /* ============================================================
   Drop Indicator
   ============================================================ */
    .drop-indicator {
      height: 3px;
      background: var(--brand);
      border-radius: 99px;
      margin: -2px 0;
      opacity: 0;
      transition: opacity var(--transition-fast);
      box-shadow: 0 0 8px var(--brand-glow);
    }

    .drop-indicator.visible {
      opacity: 1;
    }

    /* ============================================================
   Toast Notifications
   ============================================================ */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--ink);
      box-shadow: var(--shadow-card);
      animation: slideInRight 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success {
      border-left: 3px solid var(--accent-green);
    }

    .toast.info {
      border-left: 3px solid var(--accent-blue);
    }

    .toast.warning {
      border-left: 3px solid var(--accent-amber);
    }

    /* ============================================================
   Empty State
   ============================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--ink-faint);
      font-size: 13px;
      text-align: center;
      gap: 4px;
    }

    .empty-state .empty-icon {
      font-size: 28px;
      margin-bottom: 4px;
      opacity: 0.5;
    }

    /* ============================================================
   Animations
   ============================================================ */
    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardOut {
      to {
        opacity: 0;
        transform: scale(0.92);
        height: 0;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============================================================
   Responsive
   ============================================================ */
    @media (max-width: 640px) {
      .app-header {
        height: auto;
        padding: 10px 12px;
        gap: 8px;
        flex-wrap: wrap;
      }

      .app-logo h1 {
        display: none;
      }

      .header-center {
        order: 3;
        flex-basis: 100%;
        justify-content: center;
        gap: 8px;
        padding-top: 4px;
      }

      .countdown {
        padding: 4px 10px;
        gap: 6px;
        font-size: 10px;
      }

      .countdown-label {
        font-size: 9px;
      }

      .countdown-value {
        font-size: 12px;
      }

      .countdown-unit {
        font-size: 7px;
      }

      .countdown-sep {
        font-size: 11px;
        margin-bottom: 8px;
      }

      .countdown-block {
        min-width: 24px;
      }

      .progress-mini {
        padding: 4px 10px;
        gap: 6px;
      }

      .progress-bar-mini {
        width: 80px;
        height: 5px;
      }

      .progress-text {
        font-size: 11px;
        min-width: 26px;
      }

      .progress-count {
        font-size: 10px;
      }

      .board {
        padding: 12px;
        gap: 12px;
        height: calc(100vh - 100px);
      }

      .column {
        --col-width: 280px;
      }

      .modal {
        margin: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }

    /* ============================================================
   Hidden file input
   ============================================================ */
    #importInput {
      display: none;
    }

    /* ============================================================
   Countdown Timer
   ============================================================ */
    .countdown {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .countdown::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(108, 92, 231, 0.05), rgba(167, 139, 250, 0.08), rgba(108, 92, 231, 0.05));
      animation: countdownShimmer 3s ease-in-out infinite;
    }

    @keyframes countdownShimmer {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .countdown-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-amber);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
    }

    .countdown-digits {
      display: flex;
      align-items: center;
      gap: 2px;
      position: relative;
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 32px;
    }

    .countdown-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .countdown-unit {
      font-size: 9px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .countdown-sep {
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
      line-height: 1;
      margin-bottom: 10px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.3;
      }
    }

    .countdown.expired .countdown-label {
      color: var(--accent-green);
    }

    .countdown.expired .countdown-value {
      color: var(--accent-green);
    }

    .countdown.expired .countdown-sep {
      animation: none;
      color: var(--accent-green);
    }
  </style>
</head>

<body>

  <!-- ===== Header ===== -->
  <header class="app-header" id="appHeader">
    <div class="app-logo">
      <div class="logo-icon">📋</div>
      <h1>Research</h1>
    </div>

    <div class="header-center">
      <div class="countdown" id="countdown">
        <span class="countdown-label">⏳ Deadline</span>
        <div class="countdown-digits" id="countdownDigits">
          <div class="countdown-block"><span class="countdown-value" id="cdDays">--</span><span
              class="countdown-unit">days</span></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-block"><span class="countdown-value" id="cdHours">--</span><span
              class="countdown-unit">hrs</span></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-block"><span class="countdown-value" id="cdMins">--</span><span
              class="countdown-unit">min</span></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-block"><span class="countdown-value" id="cdSecs">--</span><span
              class="countdown-unit">sec</span></div>
        </div>
      </div>
      <div class="progress-mini">
        <div class="progress-bar-mini">
          <div class="fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressPct">0%</span>
        <span class="progress-count" id="progressCount">0/0</span>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn-icon" data-tooltip="Export JSON" id="exportBtn" aria-label="Export JSON">📤</button>
      <button class="btn-icon" data-tooltip="Import JSON" id="importBtn" aria-label="Import JSON">📥</button>
      <button class="btn-icon" data-tooltip="ล้างข้อมูลทั้งหมด" id="resetBtn"
        aria-label="ล้างข้อมูลทั้งหมด">🗑️</button>
    </div>
    <input type="file" id="importInput" accept=".json">
  </header>

  <!-- ===== Board ===== -->
  <main class="board" id="board"></main>

  <!-- ===== Edit Modal ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">แก้ไขการ์ด</h2>
        <button class="modal-close" id="modalClose" aria-label="ปิด">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editTitle">ชื่องาน</label>
          <input type="text" class="form-input" id="editTitle" placeholder="กรอกชื่องาน...">
        </div>
        <div class="form-group">
          <label for="editDesc">รายละเอียด</label>
          <textarea class="form-input" id="editDesc" placeholder="เพิ่มรายละเอียด..."></textarea>
        </div>
        <div class="form-group">
          <label for="editDue">กำหนดส่ง</label>
          <input type="date" class="form-input" id="editDue">
        </div>
        <div class="form-group">
          <label>ป้ายสถานะ</label>
          <div class="form-labels" id="editLabels"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="modalDelete">🗑 ลบการ์ด</button>
        <div class="add-form-actions">
          <button class="btn-ghost" id="modalCancel">ยกเลิก</button>
          <button class="btn-primary" id="modalSave">💾 บันทึก</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    /* ==========================================================
       Constants & Default Data
       ========================================================== */
    const STORAGE_KEY = 'research-kanban-v2';

    const LABELS = [
      { id: 'urgent', name: 'เร่งด่วน', color: '#ef4444' },
      { id: 'review', name: 'รอตรวจสอบ', color: '#f59e0b' },
      { id: 'milestone', name: 'ไมล์สโตน', color: '#10b981' },
      { id: 'research', name: 'วิจัย', color: '#3b82f6' },
      { id: 'writing', name: 'เขียนรายงาน', color: '#8b5cf6' },
    ];

    const COL_COLORS = ['#6c5ce7', '#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#ec4899'];

    function uid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return 'xxxx-xxxx-xxxx'.replace(/x/g, () => (Math.random() * 16 | 0).toString(16));
    }

    /* Import original tasks from the old 30-day checklist */
    function getDefaultData() {
      return {
        columns: [
          {
            id: uid(), title: 'Backlog', color: COL_COLORS[0],
            cards: [
              { id: uid(), title: 'ตั้งสภาพแวดล้อม (Python, Colab/Kaggle, API key, Hugging Face) และติดตั้งตัวแปล open-source 2 ตัว (NLLB-200 + Typhoon-translate)', description: 'สัปดาห์ 1 — วัน 1–2', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'เตรียมชุดทดสอบ ~150–250 คู่ประโยคจาก FLORES-200 + เขียนประโยคเชิงวัฒนธรรมไทยเพิ่ม และเขียนเกณฑ์ว่าแบบไหนนับว่ามั่ว', description: 'สัปดาห์ 1 — วัน 3–4', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'Pilot — รันตัว open-source บน ~20 ประโยค ให้ flow ทำงานครบจากต้นจนจบ', description: 'สัปดาห์ 1 — วัน 5–7', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: '🏁 ไมล์สโตน: ข้อมูลพร้อม + baseline รันได้', description: 'จบสัปดาห์ที่ 1', labels: ['milestone'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'สร้าง pipeline ตัวแปลของคุณ: LLM แปล → ตรวจย้อนกลับด้วย back-translation/NLI → แก้ ให้ทำงานบน pilot ก่อน', description: 'สัปดาห์ 2 — วัน 8–11\n⚠ จุดเสี่ยงสุดของทั้งโปรเจกต์ — ถ้า pipeline ติด ทุกอย่างหลังจากนี้เลื่อนหมด', labels: ['research', 'urgent'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'รันทั้งตัวของคุณ + open-source บนชุดเต็ม เก็บคำแปลทั้งหมดลงไฟล์', description: 'สัปดาห์ 2 — วัน 12–14', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: '🏁 ไมล์สโตน: มีคำแปลครบทุกระบบ พร้อมเอาไปวัด', description: 'จบสัปดาห์ที่ 2', labels: ['milestone'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'ตั้งมาตรวัด เลือก 2 วิธี: NLI + LLM-as-judge ด้านความซื่อสัตย์', description: 'สัปดาห์ 3 — วัน 15–17', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'รันมาตรวัดบนคำแปลทุกระบบ', description: 'สัปดาห์ 3 — วัน 18–19', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'Spot-check เอง ~50 ประโยค เทียบว่ามาตรวัดอัตโนมัติตรงกับสายตาคนไหม', description: 'สัปดาห์ 3 — วัน 20–21', labels: ['review'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: '🏁 ไมล์สโตน: มีตัวเลขอัตราการมั่วของทุกระบบ', description: 'จบสัปดาห์ที่ 3', labels: ['milestone'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'รวมผล คำนวณอัตราการมั่วต่อระบบ ทำตาราง/กราฟเทียบ', description: 'สัปดาห์ 4 — วัน 22–24 — ตอบคำถามวิจัย', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'Error analysis — ดูว่าแต่ละระบบมั่วแบบไหน (เติม/บิด/ตก) พร้อมตัวอย่างจริง', description: 'สัปดาห์ 4 — วัน 25–27', labels: ['research'], createdAt: new Date().toISOString(), dueDate: '' },
              { id: uid(), title: 'เขียนรายงาน (บทนำ–วิธี–ผล–อภิปราย)', description: 'สัปดาห์ 4 — วัน 28–30', labels: ['writing'], createdAt: new Date().toISOString(), dueDate: '' },
            ]
          },
          { id: uid(), title: 'กำลังทำ', color: COL_COLORS[1], cards: [] },
          { id: uid(), title: 'ตรวจสอบ', color: COL_COLORS[2], cards: [] },
          { id: uid(), title: 'เสร็จแล้ว', color: COL_COLORS[3], cards: [] },
        ],
        labels: LABELS,
      };
    }

    /* ==========================================================
       State Management
       ========================================================== */
    let data;
    let editingCardId = null;
    let editingColumnId = null;
    let draggedCardId = null;
    let draggedFromColId = null;
    let openContextMenu = null;

    function loadData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          data = JSON.parse(stored);
          // Ensure labels exist
          if (!data.labels) data.labels = LABELS;
          return;
        }
      } catch (e) { /* ignore */ }
      data = getDefaultData();
      saveData();
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        showToast('ไม่สามารถบันทึกข้อมูลได้', 'warning');
      }
    }

    /* ==========================================================
       Rendering
       ========================================================== */
    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      data.columns.forEach((col, colIdx) => {
        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.dataset.colId = col.id;

        // Header
        const header = document.createElement('div');
        header.className = 'column-header';

        const dot = document.createElement('div');
        dot.className = 'column-dot';
        dot.style.background = col.color || COL_COLORS[colIdx % COL_COLORS.length];

        const titleInput = document.createElement('input');
        titleInput.type = 'text';
        titleInput.className = 'column-title';
        titleInput.value = col.title;
        titleInput.setAttribute('aria-label', 'ชื่อคอลัมน์');
        titleInput.addEventListener('change', () => {
          col.title = titleInput.value.trim() || col.title;
          saveData();
          showToast('เปลี่ยนชื่อคอลัมน์แล้ว', 'success');
        });
        titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') titleInput.blur(); });

        const count = document.createElement('span');
        count.className = 'column-count';
        count.textContent = col.cards.length;

        const menuBtn = document.createElement('button');
        menuBtn.className = 'column-menu-btn';
        menuBtn.textContent = '⋯';
        menuBtn.setAttribute('aria-label', 'เมนูคอลัมน์');
        menuBtn.addEventListener('click', e => {
          e.stopPropagation();
          showColumnMenu(col.id, menuBtn);
        });

        header.append(dot, titleInput, count, menuBtn);

        // Cards container
        const cardsContainer = document.createElement('div');
        cardsContainer.className = 'column-cards';
        cardsContainer.dataset.colId = col.id;

        // Drag events on column
        cardsContainer.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          cardsContainer.classList.add('drag-over-cards');
          colEl.classList.add('drag-over');
        });
        cardsContainer.addEventListener('dragleave', e => {
          if (!cardsContainer.contains(e.relatedTarget)) {
            cardsContainer.classList.remove('drag-over-cards');
            colEl.classList.remove('drag-over');
          }
        });
        cardsContainer.addEventListener('drop', e => {
          e.preventDefault();
          cardsContainer.classList.remove('drag-over-cards');
          colEl.classList.remove('drag-over');
          handleDrop(col.id, e, cardsContainer);
        });

        if (col.cards.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.innerHTML = '<span class="empty-icon">📭</span><span>ยังไม่มีการ์ด</span><span style="font-size:11px">ลากการ์ดมาที่นี่ หรือเพิ่มใหม่</span>';
          cardsContainer.appendChild(empty);
        } else {
          col.cards.forEach(card => {
            cardsContainer.appendChild(createCardEl(card, col.id));
          });
        }

        // Add card form (inline)
        const addForm = document.createElement('div');
        addForm.className = 'add-card-form';
        addForm.id = `add-form-${col.id}`;
        addForm.innerHTML = `
      <textarea class="add-card-input" placeholder="ชื่องานใหม่..." rows="2"></textarea>
      <div class="add-form-actions">
        <button class="btn-primary add-form-submit">➕ เพิ่ม</button>
        <button class="btn-ghost add-form-cancel">ยกเลิก</button>
      </div>
    `;

        const textarea = addForm.querySelector('textarea');
        addForm.querySelector('.add-form-submit').addEventListener('click', () => {
          const title = textarea.value.trim();
          if (!title) return;
          addCard(col.id, title);
          textarea.value = '';
          addForm.classList.remove('visible');
          addBtn.style.display = '';
        });
        addForm.querySelector('.add-form-cancel').addEventListener('click', () => {
          textarea.value = '';
          addForm.classList.remove('visible');
          addBtn.style.display = '';
        });
        textarea.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addForm.querySelector('.add-form-submit').click();
          }
          if (e.key === 'Escape') {
            addForm.querySelector('.add-form-cancel').click();
          }
        });

        // Add button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-card-btn';
        addBtn.innerHTML = '＋ เพิ่มงาน';
        addBtn.addEventListener('click', () => {
          addBtn.style.display = 'none';
          addForm.classList.add('visible');
          textarea.focus();
        });

        colEl.append(header, cardsContainer, addForm, addBtn);
        board.appendChild(colEl);
      });

      // Add column button
      const addColBtn = document.createElement('button');
      addColBtn.className = 'add-column-btn';
      addColBtn.innerHTML = '＋ เพิ่มคอลัมน์';
      addColBtn.addEventListener('click', addColumn);
      board.appendChild(addColBtn);

      updateProgress();
    }

    function createCardEl(card, colId) {
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.dataset.cardId = card.id;

      // Labels
      if (card.labels && card.labels.length > 0) {
        const labelsEl = document.createElement('div');
        labelsEl.className = 'card-labels';
        card.labels.forEach(labelId => {
          const labelDef = (data.labels || LABELS).find(l => l.id === labelId);
          if (labelDef) {
            const badge = document.createElement('span');
            badge.className = 'card-label';
            badge.style.background = labelDef.color;
            badge.dataset.name = labelDef.name;
            badge.textContent = '';
            el.addEventListener('mouseenter', () => { badge.textContent = labelDef.name; });
            el.addEventListener('mouseleave', () => { badge.textContent = ''; });
            labelsEl.appendChild(badge);
          }
        });
        el.appendChild(labelsEl);
      }

      // Title
      const titleEl = document.createElement('div');
      titleEl.className = 'card-title';
      titleEl.textContent = card.title;
      el.appendChild(titleEl);

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'card-meta';

      if (card.dueDate) {
        const due = document.createElement('span');
        due.className = 'card-due';
        const isOverdue = new Date(card.dueDate) < new Date() && !isCardDone(card.id);
        if (isOverdue) due.classList.add('overdue');
        due.innerHTML = `📅 ${formatDate(card.dueDate)}`;
        meta.appendChild(due);
      }

      if (card.description) {
        const desc = document.createElement('span');
        desc.className = 'card-desc-indicator';
        desc.innerHTML = '📝 รายละเอียด';
        meta.appendChild(desc);
      }

      if (meta.children.length > 0) el.appendChild(meta);

      // Actions
      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'card-action-btn';
      editBtn.textContent = '✏️';
      editBtn.setAttribute('aria-label', 'แก้ไข');
      editBtn.addEventListener('click', e => { e.stopPropagation(); openEditModal(card.id, colId); });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'card-action-btn delete';
      deleteBtn.textContent = '🗑';
      deleteBtn.setAttribute('aria-label', 'ลบ');
      deleteBtn.addEventListener('click', e => { e.stopPropagation(); deleteCard(card.id, colId); });

      actions.append(editBtn, deleteBtn);
      el.appendChild(actions);

      // Click to edit
      el.addEventListener('click', () => openEditModal(card.id, colId));

      // Drag events
      el.addEventListener('dragstart', e => {
        draggedCardId = card.id;
        draggedFromColId = colId;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', card.id);
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        draggedCardId = null;
        draggedFromColId = null;
        document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
        document.querySelectorAll('.column-cards').forEach(c => c.classList.remove('drag-over-cards'));
      });

      return el;
    }

    /* ==========================================================
       Drag & Drop
       ========================================================== */
    function handleDrop(targetColId, e, cardsContainer) {
      if (!draggedCardId || !draggedFromColId) return;

      const sourceCol = data.columns.find(c => c.id === draggedFromColId);
      const targetCol = data.columns.find(c => c.id === targetColId);
      if (!sourceCol || !targetCol) return;

      const cardIdx = sourceCol.cards.findIndex(c => c.id === draggedCardId);
      if (cardIdx === -1) return;

      const [card] = sourceCol.cards.splice(cardIdx, 1);

      // Determine drop position
      const cardEls = [...cardsContainer.querySelectorAll('.card:not(.dragging)')];
      let insertIdx = cardEls.length; // default: at end

      for (let i = 0; i < cardEls.length; i++) {
        const rect = cardEls[i].getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
          insertIdx = i;
          break;
        }
      }

      targetCol.cards.splice(insertIdx, 0, card);
      saveData();
      renderBoard();
      showToast('ย้ายการ์ดแล้ว', 'success');
    }

    /* ==========================================================
       Card CRUD
       ========================================================== */
    function addCard(colId, title, desc = '', labels = []) {
      const col = data.columns.find(c => c.id === colId);
      if (!col) return;
      col.cards.push({
        id: uid(),
        title,
        description: desc,
        labels,
        createdAt: new Date().toISOString(),
        dueDate: '',
      });
      saveData();
      renderBoard();
      showToast('เพิ่มการ์ดแล้ว', 'success');
    }

    function deleteCard(cardId, colId) {
      if (!confirm('ลบการ์ดนี้หรือไม่?')) return;
      const col = data.columns.find(c => c.id === colId);
      if (!col) return;

      // Animate out
      const cardEl = document.querySelector(`[data-card-id="${cardId}"]`);
      if (cardEl) {
        cardEl.classList.add('card-removing');
        setTimeout(() => {
          col.cards = col.cards.filter(c => c.id !== cardId);
          saveData();
          renderBoard();
          showToast('ลบการ์ดแล้ว', 'info');
        }, 250);
      } else {
        col.cards = col.cards.filter(c => c.id !== cardId);
        saveData();
        renderBoard();
      }
    }

    function findCard(cardId) {
      for (const col of data.columns) {
        const card = col.cards.find(c => c.id === cardId);
        if (card) return { card, col };
      }
      return null;
    }

    function isCardDone(cardId) {
      const lastCol = data.columns[data.columns.length - 1];
      return lastCol && lastCol.cards.some(c => c.id === cardId);
    }

    /* ==========================================================
       Edit Modal
       ========================================================== */
    function openEditModal(cardId, colId) {
      const found = findCard(cardId);
      if (!found) return;
      const { card } = found;
      editingCardId = cardId;
      editingColumnId = colId;

      document.getElementById('editTitle').value = card.title;
      document.getElementById('editDesc').value = card.description || '';
      document.getElementById('editDue').value = card.dueDate || '';

      // Render label toggles
      const labelsContainer = document.getElementById('editLabels');
      labelsContainer.innerHTML = '';
      (data.labels || LABELS).forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'label-toggle' + (card.labels && card.labels.includes(label.id) ? ' active' : '');
        btn.style.background = label.color + '33';
        btn.style.color = label.color;
        btn.textContent = label.name;
        btn.dataset.labelId = label.id;
        btn.addEventListener('click', () => btn.classList.toggle('active'));
        labelsContainer.appendChild(btn);
      });

      document.getElementById('modalOverlay').classList.add('visible');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('visible');
      editingCardId = null;
      editingColumnId = null;
    }

    function saveModal() {
      if (!editingCardId) return;
      const found = findCard(editingCardId);
      if (!found) return;
      const { card } = found;

      card.title = document.getElementById('editTitle').value.trim() || card.title;
      card.description = document.getElementById('editDesc').value.trim();
      card.dueDate = document.getElementById('editDue').value;

      // Collect active labels
      const activeBtns = document.querySelectorAll('#editLabels .label-toggle.active');
      card.labels = [...activeBtns].map(b => b.dataset.labelId);

      saveData();
      renderBoard();
      closeModal();
      showToast('บันทึกแล้ว ✓', 'success');
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('modalDelete').addEventListener('click', () => {
      if (editingCardId && editingColumnId) {
        const cardId = editingCardId;
        const colId = editingColumnId;
        closeModal();
        deleteCard(cardId, colId);
      }
    });
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeModal();
        closeContextMenu();
      }
    });

    /* ==========================================================
       Column Operations
       ========================================================== */
    function addColumn() {
      const title = prompt('ชื่อคอลัมน์ใหม่:');
      if (!title || !title.trim()) return;
      data.columns.push({
        id: uid(),
        title: title.trim(),
        color: COL_COLORS[data.columns.length % COL_COLORS.length],
        cards: [],
      });
      saveData();
      renderBoard();
      showToast('เพิ่มคอลัมน์แล้ว', 'success');
    }

    function deleteColumn(colId) {
      const col = data.columns.find(c => c.id === colId);
      if (!col) return;
      if (col.cards.length > 0) {
        if (!confirm(`คอลัมน์ "${col.title}" มี ${col.cards.length} การ์ด จะลบทั้งหมดหรือไม่?`)) return;
      }
      data.columns = data.columns.filter(c => c.id !== colId);
      saveData();
      renderBoard();
      showToast('ลบคอลัมน์แล้ว', 'info');
    }

    function clearColumn(colId) {
      const col = data.columns.find(c => c.id === colId);
      if (!col) return;
      if (!confirm(`ล้างการ์ดทั้งหมดในคอลัมน์ "${col.title}"?`)) return;
      col.cards = [];
      saveData();
      renderBoard();
      showToast('ล้างคอลัมน์แล้ว', 'info');
    }

    /* ==========================================================
       Context Menu
       ========================================================== */
    function showColumnMenu(colId, anchorEl) {
      closeContextMenu();
      const rect = anchorEl.getBoundingClientRect();
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.style.position = 'fixed';
      menu.style.top = rect.bottom + 4 + 'px';
      menu.style.left = rect.left + 'px';
      menu.innerHTML = `
    <button data-action="clear">🧹 ล้างการ์ดทั้งหมด</button>
    <div class="divider"></div>
    <button data-action="delete" class="danger">🗑 ลบคอลัมน์</button>
  `;
      menu.querySelector('[data-action="clear"]').addEventListener('click', () => {
        closeContextMenu();
        clearColumn(colId);
      });
      menu.querySelector('[data-action="delete"]').addEventListener('click', () => {
        closeContextMenu();
        deleteColumn(colId);
      });

      document.body.appendChild(menu);
      openContextMenu = menu;

      // Close on outside click
      setTimeout(() => {
        document.addEventListener('click', closeContextMenu, { once: true });
      }, 10);
    }

    function closeContextMenu() {
      if (openContextMenu) {
        openContextMenu.remove();
        openContextMenu = null;
      }
    }

    /* ==========================================================
       Progress
       ========================================================== */
    function updateProgress() {
      const totalCards = data.columns.reduce((s, c) => s + c.cards.length, 0);
      const lastCol = data.columns[data.columns.length - 1];
      const doneCards = lastCol ? lastCol.cards.length : 0;
      const pct = totalCards > 0 ? Math.round(doneCards / totalCards * 100) : 0;

      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressCount').textContent = `${doneCards}/${totalCards} เสร็จ`;
    }

    /* ==========================================================
       Export / Import
       ========================================================== */
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'research-kanban-backup.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Export สำเร็จ', 'success');
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importInput').click();
    });

    document.getElementById('importInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        try {
          const imported = JSON.parse(evt.target.result);
          if (!imported.columns || !Array.isArray(imported.columns)) {
            throw new Error('Invalid format');
          }
          data = imported;
          if (!data.labels) data.labels = LABELS;
          saveData();
          renderBoard();
          showToast('Import สำเร็จ', 'success');
        } catch (err) {
          showToast('ไฟล์ไม่ถูกต้อง', 'warning');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    /* ==========================================================
       Reset
       ========================================================== */
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!confirm('ล้างข้อมูลทั้งหมดแล้วกลับเป็นค่าเริ่มต้น?')) return;
      localStorage.removeItem(STORAGE_KEY);
      data = getDefaultData();
      saveData();
      renderBoard();
      showToast('รีเซ็ตเรียบร้อย', 'info');
    });

    /* ==========================================================
       Helpers
       ========================================================== */
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', info: 'ℹ️', warning: '⚠️' };
      toast.innerHTML = `<span>${icons[type] || ''}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(30px)';
        toast.style.transition = '0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    /* ==========================================================
       Countdown Timer — 7 สิงหาคม 2569 (7 Aug 2026)
       ========================================================== */
    const DEADLINE = new Date('2026-08-07T23:59:59+07:00').getTime();

    function updateCountdown() {
      const now = Date.now();
      const diff = DEADLINE - now;
      const el = document.getElementById('countdown');

      if (diff <= 0) {
        el.classList.add('expired');
        document.getElementById('cdDays').textContent = '00';
        document.getElementById('cdHours').textContent = '00';
        document.getElementById('cdMins').textContent = '00';
        document.getElementById('cdSecs').textContent = '00';
        document.querySelector('.countdown-label').textContent = '✅ ครบกำหนด!';
        return;
      }

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);

      document.getElementById('cdDays').textContent = String(days).padStart(2, '0');
      document.getElementById('cdHours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cdMins').textContent = String(mins).padStart(2, '0');
      document.getElementById('cdSecs').textContent = String(secs).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* ==========================================================
       Init
       ========================================================== */
    loadData();
    renderBoard();
  </script>
</body>

</html>
